<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardBuySearch — 缺卡湊齊比價</title>
  <link rel="stylesheet" href="style.css?v=__V__">
  <script>/* 開頁即套用主題，避免閃白 */
    if (localStorage.getItem("cbs_theme") === "dark")
      document.documentElement.dataset.theme = "dark";
  </script>
</head>
<body>
  <header class="topbar">
    <button id="themeToggle" class="theme-toggle" title="切換深色/淺色模式">🌙</button>
    <h1>🃏 CardBuySearch</h1>
    <p class="tagline">找出能一次買齊你缺卡的賣家 — 寶可夢繁中 × 露天拍賣</p>
  </header>

  <main class="layout">
    <section class="panel search-panel">
      <h2>1️⃣ 搜尋卡片</h2>
      <div class="game-tabs">
        <label><input type="radio" name="game" value="pkm" checked> 寶可夢（繁中）</label>
        <label><input type="radio" name="game" value="ygo"> 遊戲王</label>
        <label><input type="radio" name="game" value="gcg"> 鋼彈</label>
      </div>
      <div class="search-controls">
        <input id="searchInput" type="text" placeholder="卡名或編號（例：噴火龍、094/081）"
               autocomplete="off">
        <select id="raritySelect"><option value="">全部稀有度</option></select>
        <button id="searchBtn">搜尋</button>
        <button id="imgSearchBtn" title="上傳卡片照片以圖搜卡（請盡量裁到只剩卡片）">📷 以圖搜卡</button>
        <button id="browseBtn" title="瀏覽全部卡片並用條件篩選">📖 全部卡片</button>
        <input id="imgInput" type="file" accept="image/*" hidden>
      </div>
      <div id="filterBar" class="filter-bar" hidden></div>
      <p id="browseCount" class="import-hint" hidden></p>
      <div id="searchResults" class="card-grid"></div>
    </section>

    <section class="panel wishlist-panel">
      <h2>2️⃣ 願望清單 <span id="wishCount" class="badge">0</span></h2>
      <details class="import-box">
        <summary>📋 匯入牌組</summary>
        <p class="import-hint">貼上牌表：YDK 檔內容、「3 灰流麗」「灰流麗 x3」，
          寶可夢可帶編號「2 噴火龍ex 125/108」，
          或直接貼<b>官方牌組編碼</b>（如 KWOjaw-KeJGts-CspXhl）。
          依上方選擇的遊戲解析。</p>
        <textarea id="deckText" rows="6" placeholder="每行一張卡…"></textarea>
        <button id="importBtn">匯入</button>
        <p id="importResult" class="import-hint"></p>
      </details>
      <ul id="wishlist" class="wishlist"></ul>
      <button id="compareBtn" class="primary" disabled>🔍 尋找能湊齊的賣家</button>
      <button id="shareBtn" class="share-btn">🔗 分享清單</button>
    </section>
  </main>

  <section id="compareSection" class="panel compare-panel" hidden>
    <h2>3️⃣ 比價結果</h2>
    <div id="compareStatus"></div>
    <div id="compareResults"></div>
  </section>

  <div id="cardModal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" title="關閉">✕</button>
      <div class="modal-body">
        <div class="modal-img"><img id="modalImg" src="" alt=""></div>
        <div class="modal-info" id="modalInfo"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>資料來源：寶可夢官方繁中卡查（卡圖版權屬 Pokémon）／露天拍賣公開搜尋。價格為即時查詢，實際以賣場為準。</p>
  </footer>

  <script src="app.js?v=__V__"></script>
</body>
</html>
